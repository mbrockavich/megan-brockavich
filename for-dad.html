<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Dad</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌙</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #0a0d18;
    --night-soft: #12172a;
    --moonlight: #e9e7dd;
    --dim: #8b90a8;
    --dimmer: #565b73;
    --line: rgba(139, 144, 168, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--night);
    color: var(--moonlight);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  #sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8vh 24px 6vh;
  }

  .back {
    align-self: flex-start;
    font-size: 0.72rem;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--dimmer);
    text-decoration: none;
    margin-bottom: 6vh;
    transition: color 0.2s;
  }
  .back:hover { color: var(--dim); }

  .heading {
    font-family: 'Italiana', serif;
    font-size: clamp(2.4rem, 7vw, 5rem);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: center;
    animation: rise 1.4s ease-out both;
  }

  .sub {
    margin-top: 12px;
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: center;
    animation: rise 1.4s ease-out 0.15s both;
  }

  .cards {
    margin-top: 8vh;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    border: 1px solid var(--line);
    animation: rise 1.4s ease-out 0.3s both;
  }

  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 32px;
    text-decoration: none;
    color: var(--moonlight);
    background: transparent;
    transition: background 0.3s ease;
    border-bottom: 1px solid var(--line);
  }
  .card:last-child { border-bottom: none; }
  .card:hover { background: var(--night-soft); }

  .card-text {}

  .card-title {
    font-family: 'Italiana', serif;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
  }

  .card-desc {
    margin-top: 5px;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .card-arrow {
    font-size: 1.1rem;
    color: var(--dimmer);
    flex-shrink: 0;
    margin-left: 24px;
    transition: color 0.2s, transform 0.2s;
  }
  .card:hover .card-arrow {
    color: var(--dim);
    transform: translateX(4px);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .heading, .sub, .cards { animation: none; }
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<main>
  <a class="back" href="index.html">← Back</a>

  <h1 class="heading">For Dad</h1>
  <div class="sub">Resources &amp; guides</div>

  <div class="cards">
    <a class="card" href="social-media-cheat-sheet.html">
      <div class="card-text">
        <div class="card-title">Social Media Cheat Sheet</div>
        <div class="card-desc">A guide for every platform</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>
</main>

<script>
(function () {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function seedStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = Math.floor((canvas.width * canvas.height) / 9000);
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.1 + 0.2,
      base: Math.random() * 0.5 + 0.15,
      speed: Math.random() * 0.0012 + 0.0004,
      offset: Math.random() * Math.PI * 2
    }));
  }

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const tw = reduceMotion ? 1 : (0.6 + 0.4 * Math.sin(t * s.speed + s.offset));
      ctx.globalAlpha = s.base * tw;
      ctx.fillStyle = '#e9e7dd';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    if (!reduceMotion) requestAnimationFrame(drawStars);
  }

  seedStars();
  window.addEventListener('resize', seedStars);
  requestAnimationFrame(drawStars);
})();
</script>

</body>
</html>
