<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The SJM Universe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night: #171334;
    --night-dark: #0c0a1e;
    --night-darker: #060512;
    --card: #efe9ff;
    --card-shadow: #d9cfff;
    --ink: #362c56;
    --ink-soft: #8b7fae;
    --gold: #d8b667;
    --gold-soft: #e9d19c;
    --star: #f2e6c2;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:
      radial-gradient(1.5px 1.5px at 8% 12%, rgba(242,230,194,0.8), transparent),
      radial-gradient(1px 1px at 22% 28%, rgba(242,230,194,0.55), transparent),
      radial-gradient(1px 1px at 38% 18%, rgba(242,230,194,0.65), transparent),
      radial-gradient(1.5px 1.5px at 54% 8%, rgba(242,230,194,0.55), transparent),
      radial-gradient(1px 1px at 68% 22%, rgba(242,230,194,0.6), transparent),
      radial-gradient(1.5px 1.5px at 79% 15%, rgba(242,230,194,0.65), transparent),
      radial-gradient(1px 1px at 91% 10%, rgba(242,230,194,0.55), transparent),
      radial-gradient(1px 1px at 12% 45%, rgba(242,230,194,0.4), transparent),
      radial-gradient(1px 1px at 63% 40%, rgba(242,230,194,0.4), transparent),
      radial-gradient(1.5px 1.5px at 88% 35%, rgba(242,230,194,0.45), transparent),
      radial-gradient(ellipse at top, var(--night) 0%, var(--night-dark) 55%, var(--night-darker) 100%);
    background-attachment:fixed;
    background-size: cover;
    font-family:'Inter', sans-serif;
    color: var(--card);
    padding: 48px 20px 80px;
  }

  .page{ max-width: 1060px; margin:0 auto; }

  nav{ text-align:center; margin-bottom: 28px; }
  nav a{
    font-family:'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-soft);
    text-decoration: none;
  }
  nav a:hover{ color: var(--card); }

  header{ text-align:center; margin-bottom: 30px; }
  header h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size: clamp(34px, 5vw, 54px);
    margin: 0 0 8px;
    color: var(--card);
  }
  header p{ font-size: 15px; color: #cbb9f7; margin:0; }

  /* mountain + three stars hero */
  .hero{
    display:block; width:100%; max-width: 520px; margin: 0 auto 40px;
  }
  .hero svg{ display:block; width:100%; height:auto; }
  .hero-star{ animation: twinkle 3.2s ease-in-out infinite; }
  .hero-star:nth-child(2){ animation-delay: .5s; }
  .hero-star:nth-child(3){ animation-delay: 1s; }
  @keyframes twinkle{
    0%, 100%{ opacity: 0.55; }
    50%{ opacity: 1; }
  }

  /* card */
  .realm-card{
    background: linear-gradient(180deg, var(--card) 0%, #e2d6fb 100%);
    color: var(--ink);
    border-radius: 3px;
    box-shadow: 0 10px 0 -4px var(--card-shadow), 0 14px 24px rgba(0,0,0,0.4);
    position: relative;
    padding: 34px 30px 40px;
  }
  .card-title{
    font-family:'Fraunces',serif; font-weight:600; font-size:20px; text-align:center;
    letter-spacing:0.04em; margin-bottom:2px;
  }
  .card-sub{
    font-family:'Space Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.14em;
    color: var(--ink-soft); text-align:center; margin-bottom:36px;
  }

  .route{ position:relative; }
  .route::before{
    content:"";
    position:absolute; left:20px; top:14px; bottom:14px; width:0;
    border-left: 3px dotted #b8a3e0;
  }

  .region{ position:relative; padding-left: 52px; margin-bottom: 40px; }
  .region:last-child{ margin-bottom:0; }
  .region-pin{
    position:absolute; left:6px; top:2px;
    width:28px; height:28px; border-radius:50%;
    background: var(--gold);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3), 0 0 0 3px var(--card);
    font-family:'Fraunces',serif; font-weight:700; font-size:13px; color:#3a2e00;
  }
  .region-pin.done{ background: #6a5bc4; color:#fff; }
  .region-head{ margin-bottom: 14px; }
  .region-realm{
    font-family:'Space Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.14em;
    color: #a3862f; margin-bottom: 2px;
  }
  .region-name{ font-family:'Fraunces',serif; font-weight:600; font-size:18px; }
  .region-blurb{ font-size: 12.5px; color: var(--ink-soft); margin-top:2px; }
  .region-progress{
    font-family:'Space Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.08em;
    padding: 3px 9px; border-radius: 20px; display:inline-block; margin-top:8px;
    background: rgba(216,182,103,0.2); color: #8a6a1e;
  }
  .region-progress.complete{ background: rgba(106,91,196,0.18); color:#5142a3; }

  /* book covers */
  .series-books{ display:flex; flex-wrap:wrap; gap: 16px; }
  .series-book{ width: 92px; text-align:center; }
  .series-book-cover{
    width:100%; aspect-ratio: 2/3;
    border-radius: 3px 8px 8px 3px/2px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.25);
    position:relative; overflow:hidden;
    margin-bottom:6px;
  }
  .series-book-cover img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:inherit; display:block; }
  .series-book-cover.read img{ filter: grayscale(0.85) brightness(0.8); }
  .series-book-cover.read::before{
    content:""; position:absolute; inset:0; background: rgba(20,15,40,0.12);
  }
  .read-badge{
    position:absolute; top:6px; right:6px;
    width:22px; height:22px; border-radius:50%;
    background: #6a5bc4;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,255,255,0.85);
  }
  .read-badge svg{ width:12px; height:12px; }
  .series-book-title{ font-size:10.5px; font-weight:600; line-height:1.25; }
  .series-book-pos{ font-family:'Space Mono',monospace; font-size:9px; color:var(--ink-soft); margin-top:1px; }
  .series-book-pos.unread{ color: var(--ink-soft); font-style: italic; }
  .series-book-pos.coming{ color: #a3862f; font-style: italic; }

  .series-book.unread .series-book-cover{
    box-shadow:none;
    border: 1.5px dashed var(--ink-soft);
    background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(54,44,86,0.06) 6px, rgba(54,44,86,0.06) 12px);
    display:flex; align-items:center; justify-content:center;
  }
  .series-book.unread .series-book-cover span{
    font-family:'Space Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:0.06em;
    color: var(--ink-soft); padding: 6px;
  }
  .series-book.unread .series-book-title{ color: var(--ink-soft); }

  .series-book-cover.upcoming{
    box-shadow:none;
    border: 1.5px dashed var(--gold);
    background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(216,182,103,0.1) 6px, rgba(216,182,103,0.1) 12px);
    display:flex; align-items:center; justify-content:center;
  }
  .series-book-cover.upcoming span{
    font-family:'Space Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:0.06em;
    color: #a3862f; padding: 6px;
  }

  footer{
    text-align:center;
    margin-top: 50px;
    font-family:'Space Mono', monospace;
    font-size: 11px;
    color: #cbb9f7;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="page">

  <nav>
    <a href="library.html">← Megan's Library</a>
  </nav>

  <header>
    <h1>The SJM Universe</h1>
    <p>Every Sarah J. Maas world, in reading order</p>
  </header>

  <div class="hero">
    <svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
      <circle class="hero-star" cx="150" cy="30" r="2.6" fill="#f2e6c2"/>
      <circle class="hero-star" cx="200" cy="14" r="3.4" fill="#f2e6c2"/>
      <circle class="hero-star" cx="250" cy="30" r="2.6" fill="#f2e6c2"/>
      <polygon points="0,220 90,70 150,150 210,50 280,150 320,90 400,220" fill="#241d47"/>
      <polygon points="150,150 210,50 250,110 175,150" fill="#2f2760" opacity="0.7"/>
    </svg>
  </div>

  <div class="realm-card">
    <div class="card-title">Three Worlds, One Author</div>
    <div class="card-sub">Erilea &middot; Prythian &middot; Midgard</div>
    <div class="route" id="route"></div>
  </div>

  <footer>&#11088; One shared reading log — check a book off anywhere, it checks off everywhere.</footer>

</div>

<script src="reading-data.js"></script>
<script>
const route = document.getElementById("route");

const readBadge = `<div class="read-badge"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;

SJM_UNIVERSE.forEach((region, i) => {
  const enriched = region.books.map(b => ({ ...b, match: findRead(b.title) }));
  const readCount = enriched.filter(b => b.match).length;
  const total = enriched.length;
  const complete = readCount === total;

  const booksHtml = enriched.map((b) => {
    const isRead = !!b.match;
    const cover = (b.match && b.match.cover) || b.cover || null;
    const coverHtml = cover
      ? `<img src="${cover}" alt="Cover of ${b.title}" loading="lazy" onerror="this.remove()">`
      : (isRead ? "" : (b.comingSoon ? `<span>Coming Soon</span>` : `<span>Not Read Yet</span>`));

    let posLabel = "", posClass = "";
    if(isRead){
      if(b.match.readDate){
        posLabel = `Read ${b.match.readDate}`;
      } else if(b.match.dateFinished){
        posLabel = `Read ${new Date(b.match.dateFinished).toLocaleDateString('en-US', {month:'long', year:'numeric'})}`;
      } else {
        posLabel = "Read";
      }
    } else if(b.comingSoon){
      posLabel = "Coming Soon"; posClass = "coming";
    } else {
      posLabel = "Not Read Yet"; posClass = "unread";
    }

    const coverClass = isRead ? " read" : (b.comingSoon ? " upcoming" : (cover ? " unread-with-cover" : ""));
    const badge = isRead ? readBadge : "";

    return `
      <div class="series-book ${isRead ? "" : (b.comingSoon ? "upcoming" : "unread")}">
        <div class="series-book-cover${coverClass}">${coverHtml}${badge}</div>
        <div class="series-book-title">${b.title}</div>
        <div class="series-book-pos ${posClass}">${posLabel}</div>
      </div>
    `;
  }).join("");

  const el = document.createElement("div");
  el.className = "region";
  el.innerHTML = `
    <div class="region-pin${complete ? " done" : ""}">${i + 1}</div>
    <div class="region-head">
      <div class="region-realm">${region.realm}</div>
      <div class="region-name">${region.name}</div>
      <div class="region-blurb">${region.blurb}</div>
      <div class="region-progress${complete ? " complete" : ""}">${complete ? "Complete" : `${readCount}/${total} read`}</div>
    </div>
    <div class="series-books">${booksHtml}</div>
  `;
  route.appendChild(el);
});
</script>

</body>
</html>
