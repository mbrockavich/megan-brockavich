<style>
  :root{
    --ink:#ece4d6;--muted:#a99fb8;
    --gold:#d8c48a;--gold-bright:#f3e6b6;--gold-dim:#8f7c4c;
    --violet:#b9a3e8;--edge:rgba(216,196,138,.28);
    --disp:'Cinzel Decorative',serif;
    --head:'Cinzel',serif;
    --serif:'Cormorant Garamond','Times New Roman',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#05030e;color:var(--ink);}
  body{
    font-family:var(--serif);min-height:100vh;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;padding:34px 16px 70px;position:relative;overflow-x:hidden;
    background:
      radial-gradient(900px 500px at 20% -8%, rgba(122,66,180,.30), transparent 60%),
      radial-gradient(820px 520px at 88% 8%, rgba(40,78,168,.26), transparent 60%),
      radial-gradient(700px 700px at 50% 118%, rgba(150,120,60,.14), transparent 60%),
      linear-gradient(#0b0620,#06040f 55%,#05030c);
  }
  #stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .wrap{width:100%;max-width:540px;position:relative;z-index:1;}

  /* ornate frame */
  .frame{position:relative;padding:34px 26px 30px;border:1px solid var(--edge);
    background:linear-gradient(180deg, rgba(24,16,44,.66), rgba(10,7,22,.72));
    box-shadow:0 0 60px rgba(90,50,150,.25), inset 0 0 40px rgba(0,0,0,.5);
    backdrop-filter:blur(2px);}
  .frame::before{content:"";position:absolute;inset:6px;border:1px solid rgba(216,196,138,.16);pointer-events:none;}
  .corner{position:absolute;color:var(--gold);font-size:15px;line-height:1;opacity:.85;text-shadow:0 0 8px rgba(216,196,138,.6);}
  .corner.tl{top:-8px;left:-8px}.corner.tr{top:-8px;right:-8px}.corner.bl{bottom:-8px;left:-8px}.corner.br{bottom:-8px;right:-8px}

  .brand{font-family:var(--disp);text-align:center;color:var(--gold-bright);
    font-size:26px;letter-spacing:5px;text-transform:uppercase;
    text-shadow:0 0 18px rgba(216,196,138,.45);}
  .brand-sub{font-family:var(--head);text-align:center;color:var(--gold-dim);
    font-size:9.5px;letter-spacing:5px;text-transform:uppercase;margin-top:8px;}
  .flourish{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--gold);margin:16px 0 4px;font-size:12px;opacity:.75;}
  .flourish::before,.flourish::after{content:"";height:1px;width:64px;background:linear-gradient(90deg,transparent,var(--edge),transparent);}

  /* moon */
  .moon-wrap{display:flex;flex-direction:column;align-items:center;margin:14px 0 6px;}
  #moon{filter:drop-shadow(0 0 14px rgba(226,214,170,.4));}
  .moon-label{font-family:var(--head);color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-top:12px;text-align:center;}
  .moon-illum{font-family:var(--head);color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:5px;}

  .date{font-family:var(--head);color:var(--violet);font-size:10.5px;letter-spacing:3px;text-transform:uppercase;text-align:center;margin:18px 0 16px;}

  .greet{display:block;font-family:var(--head);font-weight:500;color:var(--gold-bright);
    font-size:15px;letter-spacing:1px;line-height:1.5;margin-bottom:16px;text-shadow:0 0 12px rgba(216,196,138,.3);}
  .decree{font-size:23px;line-height:1.62;text-align:center;color:var(--ink);padding:0 2px;min-height:96px;}
  .decree .body{color:#ded4e6;}
  .signoff{font-family:var(--head);color:var(--gold-dim);font-size:10px;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-top:20px;}

  .chart{display:flex;justify-content:center;gap:22px;flex-wrap:wrap;margin:22px 0 4px;}
  .chart .cell{text-align:center;}
  .chart .role{font-family:var(--head);color:var(--gold-dim);font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
  .chart .glyph{color:var(--gold);font-size:19px;text-shadow:0 0 10px rgba(216,196,138,.5);}
  .chart .nm{font-family:var(--head);color:var(--muted);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

  .controls{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:24px;}
  label.sel{font-family:var(--head);font-size:9px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;}
  select{font-family:var(--head);font-size:11px;letter-spacing:1px;background:rgba(10,7,22,.8);color:var(--ink);border:1px solid var(--edge);padding:8px 12px;text-transform:uppercase;cursor:pointer;}
  button{font-family:var(--head);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;background:transparent;color:var(--gold);border:1px solid var(--edge);padding:9px 16px;cursor:pointer;transition:all .25s;}
  button:hover{background:rgba(216,196,138,.08);border-color:var(--gold);box-shadow:0 0 14px rgba(216,196,138,.25);}
  .foot{text-align:center;font-family:var(--head);font-size:8.5px;letter-spacing:2px;color:#4a4360;text-transform:uppercase;margin-top:26px;}
  .why{margin-top:22px;border-top:1px solid var(--edge);padding-top:12px;}
  .whybtn{width:100%;background:transparent;border:none;color:var(--gold);font-family:var(--head);font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;padding:6px 0;transition:color .2s;}
  .whybtn:hover{color:var(--gold-bright);text-shadow:0 0 10px rgba(216,196,138,.4);}
  .whybody{max-height:0;overflow:hidden;transition:max-height .55s ease;text-align:left;}
  .why.open .whybody{max-height:1400px;}
  .whyrow{margin:16px 2px 0;}
  .whyh{font-family:var(--head);color:var(--gold);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .whyrow p{font-family:var(--serif);color:#cfc6dc;font-size:16px;line-height:1.5;}
  .whyrow p b{color:var(--gold-bright);font-weight:500;}
  @media(max-width:480px){.brand{font-size:21px;letter-spacing:3px;}.decree{font-size:20px;}.frame{padding:30px 18px 26px;}}
</style>

<canvas id="stars"></canvas>
<div class="wrap">
  <div class="frame">

<script>
/* ---------- starfield ---------- */
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');let w,h,stars=[];
  function size(){w=c.width=innerWidth;h=c.height=innerHeight;stars=Array.from({length:Math.min(200,Math.floor(w*h/7000))},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.3+.2,a:Math.random(),tw:Math.random()*.02+.003,c:Math.random()<.22?'185,163,232':'216,196,138'}));}
  function draw(){x.clearRect(0,0,w,h);for(const s of stars){s.a+=s.tw;const o=(Math.sin(s.a)+1)/2*.7+.08;x.beginPath();x.fillStyle='rgba('+s.c+','+o.toFixed(3)+')';x.arc(s.x,s.y,s.r,0,7);x.fill();}requestAnimationFrame(draw);}
  size();draw();addEventListener('resize',size);
})();

/* ---------- deterministic daily RNG ---------- */
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}
function todayKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

/* ---------- live moon (Schlyter) ---------- */
const SIGNS=["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];
const RAD=Math.PI/180;
function rev(x){x=x%360;return x<0?x+360:x;}
function sind(x){return Math.sin(x*RAD);}function cosd(x){return Math.cos(x*RAD);}
function moonNow(){
  const dt=new Date();
  const Y=dt.getUTCFullYear(),Mo=dt.getUTCMonth()+1,D=dt.getUTCDate();
  let d=367*Y-Math.floor(7*(Y+Math.floor((Mo+9)/12))/4)+Math.floor(275*Mo/9)+D-730530;
  d+=(dt.getUTCHours()+dt.getUTCMinutes()/60+dt.getUTCSeconds()/3600)/24;
  const N=rev(125.1228-0.0529538083*d),i=5.1454,w=rev(318.0634+0.1643573223*d),a=60.2666,e=0.0549,M=rev(115.3654+13.0649929509*d);
  let E=M+(180/Math.PI)*e*sind(M)*(1+e*cosd(M));
  for(let k=0;k<6;k++){E=E-(E-(180/Math.PI)*e*sind(E)-M)/(1-e*cosd(E));}
  const xv=a*(cosd(E)-e),yv=a*Math.sqrt(1-e*e)*sind(E);
  const v=rev(Math.atan2(yv,xv)/RAD);
  let lon=rev(Math.atan2(sind(N)*cosd(v+w)+cosd(N)*sind(v+w)*cosd(i),cosd(N)*cosd(v+w)-sind(N)*sind(v+w)*cosd(i))/RAD);
  const Ms=rev(356.0470+0.9856002585*d),ws=282.9404+4.70935e-5*d,Ls=rev(ws+Ms);
  const Lm=rev(N+w+M),Dm=rev(Lm-Ls),F=rev(Lm-N);
  lon+=-1.274*sind(M-2*Dm)+0.658*sind(2*Dm)-0.186*sind(Ms)-0.059*sind(2*M-2*Dm)-0.057*sind(M-2*Dm+Ms)+0.053*sind(M+2*Dm)+0.046*sind(2*Dm-Ms)+0.041*sind(M-Ms)-0.035*sind(Dm)-0.031*sind(M+Ms)-0.015*sind(2*F-2*Dm)+0.011*sind(M-4*Dm);
  lon=rev(lon);
  const sign=SIGNS[Math.floor(lon/30)];
  const elong=rev(lon-Ls),illum=(1-cosd(elong))/2,ip=illum*100,waxing=elong<180;
  let phase;
  if(ip<1)phase="New Moon";else if(ip>99)phase="Full Moon";
  else if(Math.abs(ip-50)<=2)phase=waxing?"First Quarter":"Last Quarter";
  else if(ip<50)phase=waxing?"Waxing Crescent":"Waning Crescent";
  else phase=waxing?"Waxing Gibbous":"Waning Gibbous";
  return {sign,phase,illum:Math.round(ip),frac:illum,waxing};
}
function drawMoon(m){
  const R=44,svg=document.getElementById('moon'),NS='http://www.w3.org/2000/svg';
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const defs=document.createElementNS(NS,'defs');
  defs.innerHTML='<radialGradient id="lit" cx="38%" cy="34%" r="72%"><stop offset="0%" stop-color="#fff8e6"/><stop offset="55%" stop-color="#efe0b4"/><stop offset="100%" stop-color="#cdb884"/></radialGradient>';
  svg.appendChild(defs);
  const base=document.createElementNS(NS,'circle');
  base.setAttribute('r',R);base.setAttribute('cx',0);base.setAttribute('cy',0);
  base.setAttribute('fill','#161028');base.setAttribute('stroke','rgba(216,196,138,.5)');base.setAttribute('stroke-width','0.8');
  svg.appendChild(base);
  const k=Math.max(0.001,Math.min(0.999,m.frac));
  const rx=R*Math.abs(1-2*k);
  const litSweep=m.waxing?1:0;
  const termSweep=(k<0.5)?litSweep:(1-litSweep);
  const p=document.createElementNS(NS,'path');
  p.setAttribute('d',`M 0 ${-R} A ${R} ${R} 0 0 ${litSweep} 0 ${R} A ${rx} ${R} 0 0 ${termSweep} 0 ${-R} Z`);
  p.setAttribute('fill','url(#lit)');
  svg.appendChild(p);
  // faint maria specks on lit side
  const specks=[[12,-8,3],[20,10,2.4],[6,16,2]];
  for(const s of specks){const cc=document.createElementNS(NS,'circle');cc.setAttribute('cx',(m.waxing?s[0]:-s[0]));cc.setAttribute('cy',s[1]);cc.setAttribute('r',s[2]);cc.setAttribute('fill','rgba(150,132,92,.22)');svg.appendChild(cc);}
}

const GENERIC_STINGER={Aries:"Aries, your first instinct is fire. Aim it at a wall that deserves burning.",Taurus:"Taurus, stubbornness is your armour today. Wear it, but leave the visor up.",Gemini:"Gemini, you will want to be in two conversations at once. Win one properly instead.",Cancer:"Cancer, your shell is not a prison. Crack a window and let one good thing in.",Leo:"Leo, the spotlight finds you regardless. Decide what it catches you doing.",Virgo:"Virgo, the flaw you are fixating on is invisible to everyone but you. Let it be.",Libra:"Libra, stop weighing it. The scale tipped hours ago and you know which way.",Scorpio:"Scorpio, you already know the truth of it. Stop making the stars spell it out.",Sagittarius:"Sagittarius, the horizon is calling. Answer it, even if only in your notebook.",Capricorn:"Capricorn, you are building something quiet and vast. Let no one rush the scaffolding.",Aquarius:"Aquarius, your strangest idea today is your best one. Refuse to make it palatable.",Pisces:"Pisces, the dream you woke from was a message. Read it twice before the day erases it."};

const NATAL={sun:"the intense, perceptive, all or nothing core of who you are",moon:"your restless, blunt inner world that craves freedom and honesty",rise:"the composed, quietly ambitious mask you meet the world in"};
function whyHTML(sign){
 const sunLine = sign==='Scorpio'
   ? 'You are read as <b>Scorpio</b>, your own Sun sign.'
   : 'Right now you are reading through the lens of <b>'+sign+'</b>; your own Sun is Scorpio.';
 return ''
 +'<div class="whyrow"><div class="whyh">The Moon right now</div><p>Tonight the Moon is a <b>'+MOON.phase+'</b> in <b>'+MOON.sign+'</b>, '+MOON.illum+'% lit. '+(PHASE_MEAN[MOON.phase]||'')+' '+(MOON_SIGN_MEAN[MOON.sign]||'')+' This is computed live from the real sky, and it shapes the opening line of today\'s decree.</p></div>'
 +'<div class="whyrow"><div class="whyh">Your stars</div><p>'+sunLine+' Your birth chart runs deeper than one sign: <b>Sun in Scorpio</b>, '+NATAL.sun+'; <b>Moon in Sagittarius</b>, '+NATAL.moon+'; <b>Capricorn Rising</b>, '+NATAL.rise+'. The closing line each day leans on whichever of these the stars favour.</p></div>'
 +'<div class="whyrow"><div class="whyh">Why it changes</div><p>The Moon shifts phase nightly and crosses into a new sign every two to three days, so the reading is recomputed from the real sky each morning. The rest turns on its own daily cycle, which is why tomorrow will not read quite like today.</p></div>';
}

let MOON=null;
function render(sign){
  const key=todayKey();
  if(!MOON){try{MOON=moonNow();}catch(e){MOON={sign:"the deep sky",phase:"Moon",illum:null,frac:0.5,waxing:true};}}
  try{drawMoon(MOON);}catch(e){}
  document.getElementById('moonLabel').textContent=MOON.phase+' in '+MOON.sign;
  document.getElementById('moonIllum').textContent=MOON.illum!=null?(MOON.illum+'% Illuminated'):'';
  document.getElementById('date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  const seed=hashStr(key+'|'+sign+(window.__reroll||''));
  const rng=mulberry(seed);
  const omen=MOON_OMEN[MOON.sign]||"the heavens keep their counsel, and that is rarely good news.";
  const lead='Beneath a '+MOON.phase+' Moon riding through '+MOON.sign+', '+omen;
  const body=pick(BODIES,rng);
  let stinger= sign==="Scorpio" ? pick([pick(SCORPIO,rng),pick(SAG_MOON,rng),pick(CAP_RISING,rng)],rng) : GENERIC_STINGER[sign];
  document.getElementById('decree').innerHTML='<span class="greet">Good morning, '+sign+'. The stars have spoken.</span> '+lead+' <span class="body">'+body+' '+stinger+'</span>';
  document.getElementById('signoff').textContent=pick(SIGNOFFS,rng);
  document.getElementById('whyBody').innerHTML=whyHTML(sign);
}

const sel=document.getElementById('signSel');
SIGNS.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
let current=localStorage.getItem('atlas_sign')||'Scorpio';
sel.value=current;render(current);
sel.addEventListener('change',()=>{current=sel.value;localStorage.setItem('atlas_sign',current);window.__reroll='';render(current);});
document.getElementById('reroll').addEventListener('click',()=>{window.__reroll=(window.__reroll?parseInt(window.__reroll)+1:1)+'';render(current);});
const why=document.getElementById('why');
document.getElementById('whyBtn').addEventListener('click',()=>{const open=why.classList.toggle('open');document.getElementById('whyBtn').innerHTML=open?'✦ Show less ✦':'✦ Tell me more ✦';});
</script>
</body>
</html>
