<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #0a0d18;
    --night-soft: #12172a;
    --moonlight: #e9e7dd;
    --dim: #8b90a8;
    --dimmer: #565b73;
    --line: rgba(139, 144, 168, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--night);
    color: var(--moonlight);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* star field */
  #sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8vh 24px 6vh;
    gap: 0;
  }

  .name {
    font-family: 'Italiana', serif;
    font-size: clamp(3rem, 9vw, 6.5rem);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1;
    text-align: center;
    animation: rise 1.4s ease-out both;
  }

  .tagline {
    margin-top: 14px;
    font-size: 0.8rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: center;
    animation: rise 1.4s ease-out 0.15s both;
  }

  /* moon */
  .moon-wrap {
    margin: 7vh 0 5vh;
    position: relative;
    animation: rise 1.6s ease-out 0.3s both;
  }

  #moon {
    display: block;
    width: clamp(180px, 32vw, 260px);
    height: auto;
    filter: drop-shadow(0 0 60px rgba(233, 231, 221, 0.12));
  }

  .phase-label {
    text-align: center;
    animation: rise 1.4s ease-out 0.45s both;
  }

  .phase-name {
    font-family: 'Italiana', serif;
    font-size: clamp(1.4rem, 3.4vw, 2rem);
    letter-spacing: 0.1em;
  }

  .phase-detail {
    margin-top: 8px;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* upcoming strip */
  .upcoming {
    margin-top: 9vh;
    width: 100%;
    max-width: 720px;
    animation: rise 1.4s ease-out 0.6s both;
  }

  .upcoming-title {
    font-size: 0.7rem;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--dimmer);
    text-align: center;
    margin-bottom: 26px;
  }

  .phase-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--line);
  }

  .phase-cell {
    padding: 22px 8px 6px;
    text-align: center;
    border-left: 1px solid var(--line);
    transition: background 0.4s ease;
  }
  .phase-cell:first-child { border-left: none; }
  .phase-cell:hover { background: var(--night-soft); }

  .phase-cell svg {
    width: 34px;
    height: 34px;
    display: block;
    margin: 0 auto 12px;
    opacity: 0.9;
  }

  .cell-name {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--moonlight);
  }

  .cell-date {
    margin-top: 5px;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--dim);
  }

  .cell-count {
    margin-top: 3px;
    margin-bottom: 14px;
    font-size: 0.66rem;
    letter-spacing: 0.12em;
    color: var(--dimmer);
  }

  nav {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 16px 24px 0;
  }

  nav a {
    font-size: 0.66rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--dimmer);
    text-decoration: none;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--dim); }

  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 24px;
    font-size: 0.66rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--dimmer);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .name, .tagline, .moon-wrap, .phase-label, .upcoming { animation: none; }
  }

  @media (max-width: 540px) {
    .phase-row { grid-template-columns: repeat(2, 1fr); }
    .phase-cell:nth-child(3) { border-left: none; }
    .phase-cell:nth-child(n+3) { border-top: 1px solid var(--line); }
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<main>
  <h1 class="name">Megan</h1>
  <div class="tagline">Connecticut &middot; under this moon</div>

  <div class="moon-wrap">
    <svg id="moon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Current moon phase"></svg>
  </div>

  <div class="phase-label">
    <div class="phase-name" id="phaseName">&nbsp;</div>
    <div class="phase-detail" id="phaseDetail">&nbsp;</div>
  </div>

  <section class="upcoming">
    <div class="upcoming-title">What's coming</div>
    <div class="phase-row" id="phaseRow"></div>
  </section>
</main>

<nav><a href="for-dad.html">For Dad</a> &middot; <a href="library.html">Megan's Library</a></nav>
<footer id="footer"></footer>

<script>
(function () {
  // ---------- lunar math ----------
  const SYNODIC = 29.530588853; // days
  // Reference new moon: 2000-01-06 18:14 UTC
  const EPOCH = Date.UTC(2000, 0, 6, 18, 14) / 86400000;

  function phaseFraction(date) {
    const days = date.getTime() / 86400000;
    let p = ((days - EPOCH) / SYNODIC) % 1;
    if (p < 0) p += 1;
    return p; // 0 = new, 0.5 = full
  }

  function illumination(p) {
    return (1 - Math.cos(2 * Math.PI * p)) / 2;
  }

  function phaseName(p) {
    const e = 0.0167; // ~half day tolerance
    if (p < e || p > 1 - e) return 'New Moon';
    if (p < 0.25 - e) return 'Waxing Crescent';
    if (p < 0.25 + e) return 'First Quarter';
    if (p < 0.5 - e) return 'Waxing Gibbous';
    if (p < 0.5 + e) return 'Full Moon';
    if (p < 0.75 - e) return 'Waning Gibbous';
    if (p < 0.75 + e) return 'Last Quarter';
    return 'Waning Crescent';
  }

  // Next occurrence of a target phase fraction (0, .25, .5, .75)
  function nextPhaseDate(now, target) {
    const p = phaseFraction(now);
    let delta = (target - p) % 1;
    if (delta <= 0.0001) delta += 1;
    return new Date(now.getTime() + delta * SYNODIC * 86400000);
  }

  // ---------- moon renderer (SVG terminator) ----------
  // Draws a disc with an elliptical terminator based on phase fraction.
  function moonPath(p, r, cx, cy) {
    // sweep: right half lit while waxing, left half while waning
    const waxing = p <= 0.5;
    // semi-minor axis of terminator ellipse, signed
    const k = Math.cos(2 * Math.PI * p); // 1 at new, -1 at full
    const rx = Math.abs(k) * r;

    // Build path: half-circle (lit limb) + terminator ellipse arc
    const top = `${cx},${cy - r}`;
    const bot = `${cx},${cy + r}`;
    const limbSweep = waxing ? 1 : 0;
    // Terminator bulges toward lit side when gibbous (k<0), toward dark side when crescent (k>0)
    let termSweep;
    if (waxing) termSweep = k > 0 ? 0 : 1;
    else termSweep = k > 0 ? 1 : 0;

    return `M ${top} A ${r} ${r} 0 0 ${limbSweep} ${bot} A ${rx} ${r} 0 0 ${termSweep} ${top} Z`;
  }

  function renderMoon(svg, p, size) {
    const r = size * 0.42, cx = size / 2, cy = size / 2;
    const litColor = '#e9e7dd';
    const darkColor = '#1a1f33';
    let inner = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${darkColor}" stroke="rgba(233,231,221,0.14)" stroke-width="1"/>`;
    const illum = illumination(p);
    if (illum > 0.995) {
      inner += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${litColor}"/>`;
    } else if (illum > 0.005) {
      inner += `<path d="${moonPath(p, r, cx, cy)}" fill="${litColor}"/>`;
    }
    // faint craters on lit surface
    inner += `
      <g fill="rgba(10,13,24,0.10)">
        <circle cx="${cx - r*0.25}" cy="${cy - r*0.3}" r="${r*0.13}"/>
        <circle cx="${cx + r*0.2}" cy="${cy + r*0.15}" r="${r*0.18}"/>
        <circle cx="${cx - r*0.1}" cy="${cy + r*0.42}" r="${r*0.09}"/>
        <circle cx="${cx + r*0.38}" cy="${cy - r*0.28}" r="${r*0.08}"/>
      </g>`;
    svg.innerHTML = inner;
  }

  function miniMoonSVG(p) {
    const size = 40, r = 16, cx = 20, cy = 20;
    const illum = illumination(p);
    let lit = '';
    if (illum > 0.995) lit = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#e9e7dd"/>`;
    else if (illum > 0.005) lit = `<path d="${moonPath(p, r, cx, cy)}" fill="#e9e7dd"/>`;
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="#1a1f33" stroke="rgba(233,231,221,0.18)" stroke-width="1"/>${lit}</svg>`;
  }

  // ---------- populate page ----------
  const now = new Date();
  const p = phaseFraction(now);

  renderMoon(document.getElementById('moon'), p, 200);

  document.getElementById('phaseName').textContent = phaseName(p);
  const pct = Math.round(illumination(p) * 100);
  const age = (p * SYNODIC).toFixed(1);
  document.getElementById('phaseDetail').textContent = `${pct}% illuminated \u00b7 day ${age} of the cycle`;

  const targets = [
    { t: 0.0, label: 'New Moon' },
    { t: 0.25, label: 'First Quarter' },
    { t: 0.5, label: 'Full Moon' },
    { t: 0.75, label: 'Last Quarter' }
  ];

  const upcoming = targets
    .map(x => ({ ...x, date: nextPhaseDate(now, x.t) }))
    .sort((a, b) => a.date - b.date);

  const fmt = new Intl.DateTimeFormat(undefined, { month: 'short', day: 'numeric' });
  const row = document.getElementById('phaseRow');
  row.innerHTML = upcoming.map(x => {
    const days = Math.round((x.date - now) / 86400000);
    const when = days === 0 ? 'today' : days === 1 ? 'in 1 day' : `in ${days} days`;
    return `<div class="phase-cell">
      ${miniMoonSVG(x.t)}
      <div class="cell-name">${x.label}</div>
      <div class="cell-date">${fmt.format(x.date)}</div>
      <div class="cell-count">${when}</div>
    </div>`;
  }).join('');

  const dateFmt = new Intl.DateTimeFormat(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('footer').textContent = dateFmt.format(now);

  // ---------- star field ----------
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function seedStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = Math.floor((canvas.width * canvas.height) / 9000);
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.1 + 0.2,
      base: Math.random() * 0.5 + 0.15,
      speed: Math.random() * 0.0012 + 0.0004,
      offset: Math.random() * Math.PI * 2
    }));
  }

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const tw = reduceMotion ? 1 : (0.6 + 0.4 * Math.sin(t * s.speed + s.offset));
      ctx.globalAlpha = s.base * tw;
      ctx.fillStyle = '#e9e7dd';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    if (!reduceMotion) requestAnimationFrame(drawStars);
  }

  seedStars();
  window.addEventListener('resize', seedStars);
  requestAnimationFrame(drawStars);
})();
</script>

</body>
</html>
